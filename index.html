<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ♡</title>
<meta property="og:title" content="Someone made something for you ♡">
<meta property="og:description" content="Open this when you're somewhere quiet.">
<style>
  /* ============================================================
     EDIT YOUR COLORS HERE (or leave them, they're already lovely)
     ============================================================ */
  :root{
    --bg1:#1a0b2e; --bg2:#3d1635; --bg3:#0f0a1e;
    --rose:#ff6b9d; --rose-soft:#ffb3c9; --gold:#ffd97a;
    --paper:#fff9f2; --ink:#4a3728;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:radial-gradient(ellipse at 20% 10%,var(--bg2) 0%,transparent 55%),
               radial-gradient(ellipse at 80% 90%,#2a1245 0%,transparent 55%),
               linear-gradient(160deg,var(--bg1),var(--bg3));
    color:#fff; position:relative;
  }
  #stars,#hearts{position:fixed;inset:0;pointer-events:none;z-index:1}
  .scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;z-index:10;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
  .scene.on{opacity:1;pointer-events:auto}

  /* ---------- Scene 1: the knock ---------- */
  .whisper{font-style:italic;color:var(--rose-soft);letter-spacing:.5px;font-size:clamp(17px,4.5vw,24px);
    line-height:1.8;max-width:560px;opacity:0;animation:riseIn 2s ease .5s forwards}
  .whisper .l2{display:block;font-size:.8em;color:rgba(255,255,255,.55);margin-top:14px;
    opacity:0;animation:riseIn 2s ease 2.2s forwards}
  @keyframes riseIn{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(18px)}}
  .tap-hint{margin-top:52px;color:rgba(255,255,255,.45);font-size:14px;letter-spacing:2px;text-transform:uppercase;
    opacity:0;animation:riseIn 1.5s ease 4s forwards, pulse 2.4s ease 5.5s infinite}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}

  /* ---------- Scene 2: envelope ---------- */
  .env-wrap{cursor:pointer;perspective:900px;animation:floaty 3.5s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .envelope{position:relative;width:min(320px,80vw);aspect-ratio:1.45;background:linear-gradient(170deg,#f7e8ff,#eed7f5);
    border-radius:8px;box-shadow:0 24px 60px rgba(255,107,157,.28),0 4px 14px rgba(0,0,0,.4)}
  .flap{position:absolute;top:0;left:0;width:100%;height:55%;background:linear-gradient(180deg,#fbd1e3,#f5b8d2);
    clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;transition:transform 1s cubic-bezier(.6,0,.3,1);
    border-radius:8px 8px 0 0;z-index:3}
  .env-wrap.open .flap{transform:rotateX(180deg);z-index:1}
  .seal{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ff8fb3,#e0447a 70%);display:flex;align-items:center;justify-content:center;
    font-size:26px;z-index:4;box-shadow:0 4px 14px rgba(224,68,122,.5);transition:opacity .5s,transform .5s}
  .env-wrap.open .seal{opacity:0;transform:translate(-50%,-50%) scale(1.6)}
  .env-body{position:absolute;inset:0;border-radius:8px;background:linear-gradient(170deg,#f7e8ff,#e9cdf2);z-index:2;
    clip-path:polygon(0 0,50% 45%,100% 0,100% 100%,0 100%)}
  .mini-letter{position:absolute;left:6%;top:12%;width:88%;height:76%;background:var(--paper);border-radius:4px;z-index:2;
    transition:transform 1s ease .6s;display:flex;align-items:center;justify-content:center;color:#c96;font-size:22px}
  .env-wrap.open .mini-letter{transform:translateY(-46%)}
  .env-caption{margin-top:36px;color:var(--rose-soft);font-style:italic;font-size:17px;animation:pulse 2.6s ease infinite}

  /* ---------- Scene 3: the letter ---------- */
  #s-letter{justify-content:flex-start;overflow-y:auto;padding-top:6vh}
  .letter{background:linear-gradient(175deg,var(--paper),#fdf0e0);color:var(--ink);max-width:640px;width:100%;
    border-radius:14px;padding:clamp(26px,6vw,52px);text-align:left;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 60px rgba(255,107,157,.12);
    position:relative;margin-bottom:24px}
  .letter::before{content:"";position:absolute;inset:10px;border:1px solid rgba(201,150,102,.35);border-radius:9px;pointer-events:none}
  .letter h2{font-size:clamp(20px,5vw,26px);color:#b0446e;margin-bottom:18px;font-weight:normal;font-style:italic}
  #typed{font-size:clamp(16px,4.2vw,18.5px);line-height:2;white-space:pre-wrap;min-height:120px}
  .caret{display:inline-block;width:2px;height:1.1em;background:#b0446e;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .sig{margin-top:22px;text-align:right;font-style:italic;color:#b0446e;font-size:clamp(17px,4.5vw,20px);opacity:0;transition:opacity 1.5s}
  .sig.show{opacity:1}
  .next-btn{opacity:0;pointer-events:none;transition:opacity 1s}
  .next-btn.show{opacity:1;pointer-events:auto}

  /* ---------- Buttons ---------- */
  .btn{font-family:inherit;font-style:italic;font-size:17px;color:#fff;background:linear-gradient(135deg,var(--rose),#c73e77);
    border:none;border-radius:40px;padding:14px 34px;cursor:pointer;letter-spacing:.5px;
    box-shadow:0 8px 26px rgba(255,107,157,.35);transition:transform .25s,box-shadow .25s}
  .btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 34px rgba(255,107,157,.5)}
  .btn.ghost{background:transparent;border:1px solid rgba(255,179,201,.5);box-shadow:none;color:var(--rose-soft)}

  /* ---------- Scene 4: reasons / curiosity cards ---------- */
  #s-cards h2{font-weight:normal;font-style:italic;font-size:clamp(20px,5.5vw,30px);color:var(--rose-soft);margin-bottom:8px}
  #s-cards p.sub{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:34px;font-style:italic}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;max-width:660px;width:100%}
  .card{aspect-ratio:.78;perspective:800px;cursor:pointer}
  .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.5,0,.3,1)}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:14px;text-align:center}
  .face.front{background:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
    border:1px solid rgba(255,179,201,.28);box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .face.front .icon{font-size:34px;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(255,107,157,.6))}
  .face.front .label{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--rose-soft)}
  .face.back{background:linear-gradient(160deg,var(--paper),#ffe9ef);color:var(--ink);transform:rotateY(180deg);
    font-size:14.5px;line-height:1.55;font-style:italic;box-shadow:0 10px 30px rgba(255,107,157,.25)}
  .cards-done{margin-top:36px}

  /* ---------- Scene 5: the question ---------- */
  #s-question h2{font-weight:normal;font-size:clamp(24px,6.5vw,40px);line-height:1.5;max-width:640px;
    background:linear-gradient(90deg,var(--rose-soft),var(--gold),var(--rose-soft));-webkit-background-clip:text;
    background-clip:text;color:transparent;animation:shimmer 5s linear infinite;background-size:200%}
  @keyframes shimmer{to{background-position:200%}}
  .q-btns{margin-top:44px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  #btn-shy{position:relative;transition:transform .3s}

  /* ---------- Scene 6: forever ---------- */
  #s-forever h2{font-weight:normal;font-style:italic;font-size:clamp(22px,6vw,34px);color:#fff;line-height:1.6;max-width:600px}
  #s-forever .days{margin-top:26px;color:var(--gold);font-size:15px;letter-spacing:1px;opacity:.9}
  #s-forever .tiny{margin-top:44px;color:rgba(255,255,255,.4);font-size:13px;font-style:italic}

  ::selection{background:var(--rose);color:#fff}
  #s-letter::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="hearts"></canvas>

<!-- Scene 1 -->
<section class="scene on" id="s-intro">
  <p class="whisper" id="intro-line">
    hey you… yes, you.<span class="l2">someone spent a long time making this, just for you.</span>
  </p>
  <div class="tap-hint">tap anywhere to begin ♡</div>
</section>

<!-- Scene 2 -->
<section class="scene" id="s-envelope">
  <div class="env-wrap" id="envWrap">
    <div class="envelope">
      <div class="flap"></div>
      <div class="mini-letter">❦</div>
      <div class="env-body"></div>
      <div class="seal">♡</div>
    </div>
  </div>
  <div class="env-caption">break the seal… I dare you</div>
</section>

<!-- Scene 3 -->
<section class="scene" id="s-letter">
  <div class="letter">
    <h2 id="letter-title"></h2>
    <div id="typed"></div>
    <div class="sig" id="letter-sig"></div>
  </div>
  <button class="btn next-btn" id="btn-after-letter">there's more… →</button>
</section>

<!-- Scene 4 -->
<section class="scene" id="s-cards">
  <h2>a few secrets, sealed for you</h2>
  <p class="sub">flip each one… curiosity looks beautiful on you</p>
  <div class="cards" id="cards"></div>
  <button class="btn cards-done next-btn" id="btn-after-cards">one last thing… →</button>
</section>

<!-- Scene 5 -->
<section class="scene" id="s-question">
  <h2 id="big-question"></h2>
  <div class="q-btns">
    <button class="btn" id="btn-yes">Yes, always ♡</button>
    <button class="btn ghost" id="btn-shy">ask me nicer</button>
  </div>
</section>

<!-- Scene 6 -->
<section class="scene" id="s-forever">
  <h2 id="forever-line"></h2>
  <div class="days" id="days-count"></div>
  <div class="tiny">screenshot this. it's yours now. so am I.</div>
</section>

<script>
/* =====================================================================
   ♡ EDIT EVERYTHING BELOW — make it truly yours ♡
   ===================================================================== */
const CONFIG = {
  herName: "my love",          // ← her name or nickname
  yourName: "yours, always",   // ← how you sign the letter, e.g. "forever yours, Shivam"

  letterTitle: "to the one my heart keeps choosing,",

  letter:
`I don't fully know how to put you into words, but I keep trying anyway, because you deserve every attempt.

You are the thought that finds me in the middle of ordinary days. The reason small things feel big. When you laugh, something in me quietly says: there she is. That's home.

I made this little corner of the internet because I wanted you to have a place that exists only because of you. No ads, no noise. Just proof that someone sat down and built something with his whole heart, thinking only of your smile when you'd open it.

Whatever today felt like, heavy or light, I need you to know this: you are loved. Not casually. Not conveniently. Deliberately. Completely. On purpose.`,

  bigQuestion: "Through every version of us, in every season yet to come… will you keep being mine?",

  foreverLine: "She said yes. The universe took notes. ♡",

  // Set your "day one" (first date / first talk) as YYYY-MM-DD, or null to hide the counter
  dayOne: null,   // e.g. "2024-02-14"

  // The curiosity cards. icon + a sealed label + the hidden note inside.
  cards: [
    { icon:"🌙", label:"open when it's late",   note:"If you're reading this at night: close your eyes for three seconds. That warmth? That's me, thinking of you right now." },
    { icon:"🌧️", label:"open when you're sad",  note:"Hey. Breathe. You've survived every hard day so far, that's a 100% record. And you don't face the next one alone. Ever." },
    { icon:"✨", label:"a secret about you",     note:"You have no idea how you light up a room. Everyone else sees it. One day I'll make you see it too." },
    { icon:"💌", label:"a confession",           note:"Sometimes I re-read our chats and smile like an idiot. Zero regrets. Would smile again." },
    { icon:"🔮", label:"our future",             note:"Slow mornings. Inside jokes no one else gets. A home that smells like coffee and sounds like your laugh. I'm building toward it." },
    { icon:"♾️", label:"open anytime",           note:"There is no version of my life, in any universe, where I don't find my way to you." },
  ],

  shyLines: ["please? 🥺","pretty please, meri jaan?","I'll wait forever, but… please?","my heart is literally buffering…","okay FINE. *gets on one knee* …now?"]
};
/* ===================== end of editable section ====================== */

const $=s=>document.querySelector(s);
function show(id){document.querySelectorAll('.scene').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');}

/* Stars */
const sc=$('#stars'),sx=sc.getContext('2d');let stars=[];
function sizeCanvas(c){c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;c.getContext('2d').setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
function initStars(){sizeCanvas(sc);stars=Array.from({length:110},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.3,p:Math.random()*Math.PI*2,s:.4+Math.random()*1.2}));}
function drawStars(t){sx.clearRect(0,0,innerWidth,innerHeight);for(const st of stars){const a=.25+.55*Math.abs(Math.sin(t/1000*st.s+st.p));sx.globalAlpha=a;sx.fillStyle=Math.random()<.02?'#ffd97a':'#fff';sx.beginPath();sx.arc(st.x,st.y,st.r,0,7);sx.fill();}sx.globalAlpha=1;}

/* Floating hearts */
const hc=$('#hearts'),hx=hc.getContext('2d');let hearts=[];let heartRate=0;
function spawnHeart(x,y,burst){hearts.push({x:x??Math.random()*innerWidth,y:y??innerHeight+20,vy:-(.35+Math.random()*.9)*(burst?2.2:1),vx:(Math.random()-.5)*(burst?3:.6),size:8+Math.random()*14,a:.9,hue:Math.random()<.25?45:[330,340,350][Math.floor(Math.random()*3)],rot:(Math.random()-.5)*.6});}
function drawHeart(h){hx.save();hx.translate(h.x,h.y);hx.rotate(h.rot);hx.scale(h.size/16,h.size/16);hx.globalAlpha=h.a;hx.fillStyle=`hsl(${h.hue} 90% 72%)`;hx.beginPath();hx.moveTo(0,5);hx.bezierCurveTo(-8,-4,-4,-11,0,-6);hx.bezierCurveTo(4,-11,8,-4,0,5);hx.fill();hx.restore();}
function stepHearts(){hx.clearRect(0,0,innerWidth,innerHeight);if(heartRate>0&&Math.random()<heartRate)spawnHeart();hearts=hearts.filter(h=>h.a>0.02&&h.y>-40);for(const h of hearts){h.y+=h.vy;h.x+=h.vx+Math.sin(h.y/40)*.4;h.a-=.0022;drawHeart(h);}}
function burst(x,y,n=26){for(let i=0;i<n;i++)spawnHeart(x+(Math.random()-.5)*60,y+(Math.random()-.5)*40,true);}

function loop(t){drawStars(t);stepHearts();requestAnimationFrame(loop);}
addEventListener('resize',()=>{initStars();sizeCanvas(hc);});
initStars();sizeCanvas(hc);requestAnimationFrame(loop);

/* Scene flow */
let started=false;
$('#s-intro').addEventListener('click',()=>{if(started)return;started=true;heartRate=.06;show('#s-envelope');});

let opened=false;
$('#envWrap').addEventListener('click',e=>{
  if(opened)return;opened=true;
  $('#envWrap').classList.add('open');
  burst(e.clientX||innerWidth/2,e.clientY||innerHeight/2);
  setTimeout(()=>{show('#s-letter');typeLetter();},1800);
});

/* Typewriter */
function typeLetter(){
  $('#letter-title').textContent=CONFIG.letterTitle.replace('{name}',CONFIG.herName);
  const el=$('#typed'),text=CONFIG.letter;let i=0;
  const caret=document.createElement('span');caret.className='caret';el.appendChild(caret);
  (function tick(){
    if(i<text.length){
      const ch=text[i++];caret.insertAdjacentText('beforebegin',ch);
      el.scrollIntoView({block:'end'});
      setTimeout(tick,ch==='\n'?260:(/[.,!?]/.test(ch)?170:26));
    }else{
      caret.remove();
      const sig=$('#letter-sig');sig.textContent='— '+CONFIG.yourName;sig.classList.add('show');
      $('#btn-after-letter').classList.add('show');
    }
  })();
}
$('#btn-after-letter').addEventListener('click',()=>{buildCards();show('#s-cards');});

/* Cards */
let flipped=0;
function buildCards(){
  const wrap=$('#cards');wrap.innerHTML='';
  CONFIG.cards.forEach(c=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="card-inner"><div class="face front"><div class="icon">${c.icon}</div><div class="label">${c.label}</div></div><div class="face back">${c.note}</div></div>`;
    d.addEventListener('click',e=>{
      if(!d.classList.contains('flipped')){d.classList.add('flipped');flipped++;burst(e.clientX,e.clientY,10);
        if(flipped>=Math.min(3,CONFIG.cards.length))$('#btn-after-cards').classList.add('show');
      }else d.classList.remove('flipped');
    });
    wrap.appendChild(d);
  });
}
$('#btn-after-cards').addEventListener('click',()=>{
  $('#big-question').textContent=CONFIG.bigQuestion;heartRate=.12;show('#s-question');
});

/* The question */
let shyIdx=0;
$('#btn-shy').addEventListener('click',function(){
  this.textContent=CONFIG.shyLines[shyIdx%CONFIG.shyLines.length];shyIdx++;
  this.style.transform=`scale(${Math.max(.55,1-shyIdx*.09)})`;
  if(shyIdx>=CONFIG.shyLines.length)this.style.display='none';
});
$('#btn-yes').addEventListener('click',e=>{
  heartRate=.45;burst(e.clientX,e.clientY,60);
  setTimeout(()=>burst(innerWidth*.3,innerHeight*.4,30),400);
  setTimeout(()=>burst(innerWidth*.7,innerHeight*.5,30),800);
  $('#forever-line').textContent=CONFIG.foreverLine;
  if(CONFIG.dayOne){
    const d=Math.floor((Date.now()-new Date(CONFIG.dayOne))/86400000);
    $('#days-count').textContent=`♡ ${d.toLocaleString()} days of us, and counting ♡`;
  }
  setTimeout(()=>show('#s-forever'),900);
  setTimeout(()=>heartRate=.15,6000);
});

/* Little sparkles wherever she taps */
addEventListener('pointerdown',e=>{if(started)burst(e.clientX,e.clientY,4);});
</script>
</body>
</html>
